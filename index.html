<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Buying a Toyota?</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f5f5f5; margin:0; padding:0; }
    .container { max-width:480px; margin:40px auto; background:#fff; padding:24px; border-radius:10px; box-shadow:0 4px 12px rgba(0,0,0,.1); }
    h1 { margin:0 0 10px; font-size:24px; }
    p { margin:0 0 12px; color:#444; font-size:14px; line-height:1.4; }
    input, select, button { width:100%; padding:12px; margin-top:10px; font-size:16px; box-sizing:border-box; }
    button { background:#000; color:#fff; border:0; border-radius:8px; cursor:pointer; }
    button:hover { opacity:.9; }
    .small { font-size:12px; color:#666; margin-top:10px; }
    .hp { position:absolute; left:-9999px; top:-9999px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Buying a Toyota?</h1>
    <p>I help people find the right Toyota without dealership games.<br>One conversation. Straight answers.</p>

    <form action="https://script.google.com/macros/s/AKfycbxVRBHLY1Hx6qnB5XY7ypyU2un7kF9-IDW_pvvpDjd5P7UqFhk5BW2l5Tx1hcj1Rdo39Q/exec" method="POST" id="leadForm">

      <!-- Honeypot (bots fill this, humans won’t) -->
      <div class="hp">
        <label>Company</label>
        <input type="text" name="company" autocomplete="off">
      </div>

      <input type="text" name="name" placeholder="Your first name" required autocomplete="given-name">

      <input type="tel" name="phone" placeholder="Phone number" required inputmode="tel" autocomplete="tel"
             pattern="^[0-9+()\\-\\.\\s]{7,20}$" title="Enter a valid phone number">

      <select name="timeframe">
        <option value="">Buying timeframe</option>
        <option>Within 30 days</option>
        <option>1–3 months</option>
        <option>Just researching</option>
      </select>

      <!-- MUST MATCH Apps Script SECRET_TOKEN -->
      <input type="hidden" name="token" value="AydinLeadToken2026!">

      <!-- Auto-captured source URL -->
      <input type="hidden" name="source" id="sourceField" value="">

      <button type="submit">Get My Options</button>

      <p class="small">I usually reply within 10–15 minutes during business hours.</p>
    </form>
  </div>

  <script>
    document.getElementById("sourceField").value = window.location.href;

    // Extra bot check client-side (optional)
    document.getElementById("leadForm").addEventListener("submit", function(e) {
      const hp = this.querySelector('input[name="company"]');
      if (hp && hp.value.trim() !== "") e.preventDefault();
    });
  </script>
</body>
</html>
